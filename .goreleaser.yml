version: 2

builds:
  - main: ./cmd/cheapshot
    binary: cheapshot
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

brews:
  - repository:
      owner: prototypeasap
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/prototypeasap/cheapshot
    description: CLI for LLM batch APIs. Chain multi-step workflows with Unix pipes.
    license: MIT
    install: |
      bin.install "cheapshot"
    test: |
      system bin/"cheapshot", "--version"
